    font-family="'Courier New',Courier,monospace"
    font-size="138"
    font-weight="bold"
    text-anchor="middle"
    fill="#c8a020"
    opacity="0.04"
    letter-spacing="16">EREBUS</text>

  <!-- EREBUS title main -->
  <text x="750" y="310"
    font-family="'Courier New',Courier,monospace"
    font-size="138"
    font-weight="bold"
    text-anchor="middle"
    fill="#ffffff"
    filter="url(#glow)"
    letter-spacing="16">EREBUS</text>

  <!-- Subtitle -->
  <text x="750" y="360"
    font-family="'Courier New',monospace"
    font-size="14"
    text-anchor="middle"
    fill="#888"
    letter-spacing="7">autonomous ai agent · solana · x/twitter</text>

  <!-- Divider -->
  <line x1="380" y1="380" x2="1120" y2="380" stroke="#333" stroke-width="0.8"/>

  <!-- Tags -->
  <g font-family="'Courier New',monospace" font-size="11" letter-spacing="1" fill="#555">
    <text x="430" y="408">python</text>
    <text x="520" y="408">·</text>
    <text x="540" y="408">claude</text>
