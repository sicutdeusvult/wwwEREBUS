<svg width="1500" height="500" viewBox="0 0 1500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glitch1">
      <feTurbulence type="fractalNoise" baseFrequency="0.9 0.1" numOctaves="1" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="4" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="scanline">
      <feFlood flood-color="#000" flood-opacity="0.08" result="flood"/>
      <feComposite in="flood" in2="SourceGraphic" operator="over"/>
    </filter>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="goldglow">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="main">
      <rect width="1500" height="500"/>
    </clipPath>
  </defs>

  <rect width="1500" height="500" fill="#000"/>

  <!-- Static noise texture via tiny rects -->
  <g opacity="0.06" fill="#fff" clip-path="url(#main)">
    <rect x="0" y="12" width="1500" height="1"/><rect x="0" y="28" width="1500" height="1"/>
    <rect x="0" y="44" width="1500" height="1"/><rect x="0" y="58" width="1500" height="1"/>
    <rect x="0" y="72" width="1500" height="1"/><rect x="0" y="88" width="1500" height="1"/>
    <rect x="0" y="102" width="1500" height="1"/><rect x="0" y="118" width="1500" height="1"/>
