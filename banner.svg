<svg width="1500" height="500" viewBox="0 0 1500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a0000"/>
      <stop offset="60%" stop-color="#0d0000"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <radialGradient id="halo" cx="50%" cy="45%" r="40%">
      <stop offset="0%" stop-color="#ff1100" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ff0000" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bigglow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="titleglow" x="-20%" y="-50%" width="140%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1500" height="500" fill="url(#bg)"/>
  <rect width="1500" height="500" fill="url(#halo)"/>

  <!-- Scanlines -->
  <rect width="1500" height="500" fill="none"
    style="background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(255,34,0,0.012) 3px, rgba(255,34,0,0.012) 4px)"/>
  <g opacity="0.025" stroke="#ff2200" stroke-width="1">
    <line x1="0" y1="25" x2="1500" y2="25"/>
    <line x1="0" y1="50" x2="1500" y2="50"/>
    <line x1="0" y1="75" x2="1500" y2="75"/>
    <line x1="0" y1="100" x2="1500" y2="100"/>
    <line x1="0" y1="125" x2="1500" y2="125"/>
    <line x1="0" y1="150" x2="1500" y2="150"/>
    <line x1="0" y1="175" x2="1500" y2="175"/>
    <line x1="0" y1="200" x2="1500" y2="200"/>
    <line x1="0" y1="225" x2="1500" y2="225"/>
    <line x1="0" y1="250" x2="1500" y2="250"/>
    <line x1="0" y1="275" x2="1500" y2="275"/>
    <line x1="0" y1="300" x2="1500" y2="300"/>
    <line x1="0" y1="325" x2="1500" y2="325"/>
    <line x1="0" y1="350" x2="1500" y2="350"/>
    <line x1="0" y1="375" x2="1500" y2="375"/>
    <line x1="0" y1="400" x2="1500" y2="400"/>
    <line x1="0" y1="425" x2="1500" y2="425"/>
    <line x1="0" y1="450" x2="1500" y2="450"/>
    <line x1="0" y1="475" x2="1500" y2="475"/>
  </g>

  <!-- Grid dots -->
  <g fill="#ff2200" opacity="0.035">
    <circle cx="100" cy="80" r="1.2"/><circle cx="300" cy="80" r="1.2"/><circle cx="500" cy="80" r="1.2"/>
    <circle cx="700" cy="80" r="1.2"/><circle cx="900" cy="80" r="1.2"/><circle cx="1100" cy="80" r="1.2"/>
    <circle cx="1300" cy="80" r="1.2"/><circle cx="1400" cy="80" r="1.2"/>
    <circle cx="100" cy="420" r="1.2"/><circle cx="300" cy="420" r="1.2"/><circle cx="500" cy="420" r="1.2"/>
    <circle cx="700" cy="420" r="1.2"/><circle cx="900" cy="420" r="1.2"/><circle cx="1100" cy="420" r="1.2"/>
    <circle cx="1300" cy="420" r="1.2"/><circle cx="1400" cy="420" r="1.2"/>
  </g>

  <!-- Top/bottom border lines -->
  <line x1="0" y1="1" x2="1500" y2="1" stroke="#ff2200" stroke-width="1" opacity="0.35"/>
  <line x1="0" y1="499" x2="1500" y2="499" stroke="#ff2200" stroke-width="1" opacity="0.35"/>

  <!-- Corner brackets -->
  <g stroke="#ff2200" stroke-width="1.5" fill="none" opacity="0.55">
    <polyline points="30,30 30,70 70,70"/><polyline points="30,30 70,30"/>
    <polyline points="1470,30 1430,30 1430,70"/><polyline points="1470,30 1470,70"/>
    <polyline points="30,470 30,430 70,430"/><polyline points="30,470 70,470"/>
    <polyline points="1470,470 1430,470 1430,430"/><polyline points="1470,470 1470,430"/>
  </g>

  <!-- Status dots -->
  <circle cx="46" cy="46" r="4" fill="#ff2200" opacity="0.8" filter="url(#glow)"/>
  <circle cx="1454" cy="46" r="4" fill="#ff2200" opacity="0.3"/>
  <circle cx="46" cy="454" r="4" fill="#ff2200" opacity="0.15"/>
  <circle cx="1454" cy="454" r="4" fill="#ff2200" opacity="0.15"/>

  <!-- System labels -->
  <text x="66" y="50" font-family="'Courier New',monospace" font-size="10" fill="#ff2200" opacity="0.45" letter-spacing="2">SYSTEM ACTIVE</text>
  <text x="1434" y="50" font-family="'Courier New',monospace" font-size="10" fill="#ff2200" opacity="0.3" letter-spacing="2" text-anchor="end">autonomous</text>

  <!-- Sigil left (decorative) -->
  <g transform="translate(200, 250)" opacity="0.12" filter="url(#glow)">
    <circle cx="0" cy="0" r="80" stroke="#ff2200" stroke-width="0.8"/>
    <circle cx="0" cy="0" r="55" stroke="#ff2200" stroke-width="1"/>
    <circle cx="0" cy="0" r="30" stroke="#ff3300" stroke-width="1.2"/>
    <line x1="-80" y1="0" x2="-35" y2="0" stroke="#ff2200" stroke-width="0.8"/>
    <line x1="35" y1="0" x2="80" y2="0" stroke="#ff2200" stroke-width="0.8"/>
    <line x1="0" y1="-80" x2="0" y2="-35" stroke="#ff2200" stroke-width="0.8"/>
    <line x1="0" y1="35" x2="0" y2="80" stroke="#ff2200" stroke-width="0.8"/>
    <ellipse cx="0" cy="0" rx="25" ry="15" stroke="#ff4400" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="8" fill="#ff2200"/>
  </g>

  <!-- Sigil right (decorative) -->
  <g transform="translate(1300, 250)" opacity="0.08" filter="url(#glow)">
    <circle cx="0" cy="0" r="80" stroke="#ff2200" stroke-width="0.8"/>
    <circle cx="0" cy="0" r="55" stroke="#ff2200" stroke-width="1"/>
    <circle cx="0" cy="0" r="30" stroke="#ff3300" stroke-width="1.2"/>
    <line x1="-80" y1="0" x2="-35" y2="0" stroke="#ff2200" stroke-width="0.8"/>
    <line x1="35" y1="0" x2="80" y2="0" stroke="#ff2200" stroke-width="0.8"/>
    <line x1="0" y1="-80" x2="0" y2="-35" stroke="#ff2200" stroke-width="0.8"/>
    <line x1="0" y1="35" x2="0" y2="80" stroke="#ff2200" stroke-width="0.8"/>
    <ellipse cx="0" cy="0" rx="25" ry="15" stroke="#ff4400" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="8" fill="#ff2200"/>
  </g>

  <!-- Central glow bloom -->
  <circle cx="750" cy="245" r="320" fill="#ff1100" opacity="0.04" filter="url(#bigglow)"/>

  <!-- EREBUS — glow layer -->
  <text x="750" y="295"
    font-family="'Courier New',Courier,monospace"
    font-size="148"
    font-weight="bold"
    text-anchor="middle"
    fill="#ff2200"
    opacity="0.12"
    filter="url(#bigglow)"
    letter-spacing="20">EREBUS</text>

  <!-- EREBUS — main -->
  <text x="750" y="295"
    font-family="'Courier New',Courier,monospace"
    font-size="148"
    font-weight="bold"
    text-anchor="middle"
    fill="#ff2200"
    filter="url(#titleglow)"
    letter-spacing="20">EREBUS</text>

  <!-- Divider line -->
  <line x1="380" y1="328" x2="1120" y2="328" stroke="#ff2200" stroke-width="0.6" opacity="0.25"/>

  <!-- Subtitle -->
  <text x="750" y="360"
    font-family="'Courier New',monospace"
    font-size="15"
    text-anchor="middle"
    fill="#cc3300"
    letter-spacing="7"
    opacity="0.85">autonomous ai agent · solana · x/twitter</text>

  <!-- Tag pills -->
  <g font-family="'Courier New',monospace" font-size="11" letter-spacing="1.5" fill="#ff3300" opacity="0.7">
    <!-- python -->
    <rect x="390" y="385" width="100" height="22" rx="2" fill="none" stroke="#ff2200" stroke-width="0.7" opacity="0.5"/>
    <text x="440" y="400" text-anchor="middle">python 3.11</text>
    <!-- claude -->
    <rect x="504" y="385" width="90" height="22" rx="2" fill="none" stroke="#ff2200" stroke-width="0.7" opacity="0.5"/>
    <text x="549" y="400" text-anchor="middle">claude ai</text>
    <!-- solana -->
    <rect x="608" y="385" width="80" height="22" rx="2" fill="none" stroke="#ff2200" stroke-width="0.7" opacity="0.5"/>
    <text x="648" y="400" text-anchor="middle">solana</text>
    <!-- meteora -->
    <rect x="702" y="385" width="90" height="22" rx="2" fill="none" stroke="#ff2200" stroke-width="0.7" opacity="0.5"/>
    <text x="747" y="400" text-anchor="middle">meteora</text>
    <!-- pump.fun -->
    <rect x="806" y="385" width="92" height="22" rx="2" fill="none" stroke="#ff2200" stroke-width="0.7" opacity="0.5"/>
    <text x="852" y="400" text-anchor="middle">pump.fun</text>
    <!-- render -->
    <rect x="912" y="385" width="78" height="22" rx="2" fill="none" stroke="#ff2200" stroke-width="0.7" opacity="0.5"/>
    <text x="951" y="400" text-anchor="middle">render</text>
    <!-- fastapi -->
    <rect x="1004" y="385" width="78" height="22" rx="2" fill="none" stroke="#ff2200" stroke-width="0.7" opacity="0.5"/>
    <text x="1043" y="400" text-anchor="middle">fastapi</text>
  </g>

  <!-- Bottom tagline -->
  <text x="750" y="456"
    font-family="'Courier New',monospace"
    font-size="11"
    text-anchor="middle"
    fill="#661100"
    letter-spacing="5"
    opacity="0.65">the signal does not ask permission</text>
</svg>
