    <text x="1100" y="80" font-size="9" opacity="0.12">10110010 01001101 11000110 01</text>
    <text x="1120" y="110" font-size="8" opacity="0.08">X5$&amp;&amp;@YX5SVP 10001 0110</text>
    <text x="1090" y="140" font-size="9" opacity="0.1">11000110 01001101 10110010</text>
    <text x="1110" y="165" font-size="8" opacity="0.07">BTmF60911005 01 10110</text>
    <text x="1080" y="195" font-size="9" opacity="0.11">01600T1gmn16a 1001 0110</text>
    <text x="1100" y="225" font-size="8" opacity="0.09">rqm001grn91 10010 01101</text>
    <text x="1120" y="255" font-size="9" opacity="0.08">01010010 10001 011 0010</text>
    <text x="1090" y="285" font-size="8" opacity="0.1">▲ 10010 01101 0010 ▲</text>
    <text x="1110" y="315" font-size="9" opacity="0.09">11001 01110001 10010011</text>
    <text x="1080" y="345" font-size="8" opacity="0.07">001 10110 01001 101100</text>
