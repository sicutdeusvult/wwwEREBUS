  </g>

  <!-- Glitch horizontal bar — mid -->
  <g opacity="0.18" clip-path="url(#main)">
    <rect x="0" y="228" width="1500" height="3" fill="#fff"/>
    <rect x="0" y="234" width="1500" height="1" fill="#fff" opacity="0.4"/>
    <rect x="200" y="240" width="800" height="2" fill="#fff" opacity="0.3"/>
