    font-family="'Courier New',monospace"
    font-size="13"
    text-anchor="middle"
    fill="#c8a020"
    opacity="0.9"
    filter="url(#glow)"
    letter-spacing="1">0100111011010010110111001010011101011111011010100</text>

  <!-- EREBUS title glow -->
