    <rect x="0" y="162" width="1500" height="1"/><rect x="0" y="178" width="1500" height="1"/>
    <rect x="0" y="192" width="1500" height="1"/><rect x="0" y="208" width="1500" height="1"/>
    <rect x="0" y="222" width="1500" height="1"/><rect x="0" y="238" width="1500" height="1"/>
    <rect x="0" y="252" width="1500" height="1"/><rect x="0" y="268" width="1500" height="1"/>
    <rect x="0" y="282" width="1500" height="1"/><rect x="0" y="298" width="1500" height="1"/>
    <rect x="0" y="312" width="1500" height="1"/><rect x="0" y="328" width="1500" height="1"/>
    <rect x="0" y="342" width="1500" height="1"/><rect x="0" y="358" width="1500" height="1"/>
    <rect x="0" y="372" width="1500" height="1"/><rect x="0" y="388" width="1500" height="1"/>
    <rect x="0" y="402" width="1500" height="1"/><rect x="0" y="418" width="1500" height="1"/>
    <rect x="0" y="432" width="1500" height="1"/><rect x="0" y="448" width="1500" height="1"/>
    <rect x="0" y="462" width="1500" height="1"/><rect x="0" y="478" width="1500" height="1"/>
    <rect x="0" y="492" width="1500" height="1"/>
  </g>

  <!-- Random binary / glitch chars — left cluster -->
  <g font-family="'Courier New',monospace" fill="#fff" clip-path="url(#main)">
    <text x="40" y="80" font-size="9" opacity="0.12">01001101 10100010 11001011 00110100</text>
    <text x="20" y="110" font-size="8" opacity="0.08">SMLWS7IY3G 10100110 01111001 &amp;PXIP</text>
    <text x="60" y="140" font-size="9" opacity="0.1">00110100111001 11010010 10001101</text>
    <text x="30" y="165" font-size="8" opacity="0.07">▲ 10011100 01101001 11000110 ▼</text>
    <text x="15" y="195" font-size="9" opacity="0.11">XY/Z01000000 07g 10001101 YVZ</text>
    <text x="50" y="225" font-size="8" opacity="0.09">001011 11100101 0001 10110010</text>
